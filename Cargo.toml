[package]
name = "rs-web"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.8.5"
chrono = "0.4.42"
dotenvy = "0.15.7"
redis = { version = "0.32.6", features = ["tokio-comp"] }
sea-orm = { git="https://github.com/SeaQL/sea-orm.git",branch="master",features = [ "sqlx-mysql", "runtime-tokio-rustls", "macros" ]}
serde = "1.0.228"
tokio = { version = "1", features = ["rt-multi-thread"] }
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
